workflows:
  android-debug:
    name: Build APK
    max_build_duration: 30
    instance_type: mac_mini_m1
    working_directory: cv-builder-app
    environment:
      java: 17
    scripts:
      - name: Build Android Debug APK
        script: |
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - "**/build/outputs/apk/**/*.apk"
